version: "2"
type: frontend
tech_stack:
  - JavaScript
  - HTML/CSS
  - Supabase (auth + backend)
  - Vanilla JS (no framework)
routes:
  - path: /login.html
    file: login.html
    auth_required: false
    description: User sign-in page
  - path: /
    file: index.html
    auth_required: true
    description: Master dashboard, role-based redirect to store or warehouse
  - path: /index.html
    file: index.html
    auth_required: true
    description: Master dashboard
  - path: /store.html
    file: store.html
    auth_required: true
    description: Store operations dashboard
  - path: /store-inventory-in.html
    file: store-inventory-in.html
    auth_required: true
    description: Store inventory in
  - path: /store-inventory-out.html
    file: store-inventory-out.html
    auth_required: true
    description: Store inventory out
  - path: /store-branch-stocks.html
    file: store-branch-stocks.html
    auth_required: true
    description: Branch stocks view
  - path: /store-sales-today.html
    file: store-sales-today.html
    auth_required: true
    description: Sales today
  - path: /warehouse.html
    file: warehouse.html
    auth_required: true
    description: Warehouse dashboard
  - path: /warehouse-inventory-in.html
    file: warehouse-inventory-in.html
    auth_required: true
    description: Warehouse inventory in
  - path: /warehouse-stocks.html
    file: warehouse-stocks.html
    auth_required: true
    description: Warehouse stocks
  - path: /warehouse-dispatch.html
    file: warehouse-dispatch.html
    auth_required: true
    description: Warehouse dispatch/transfers
  - path: /inventory.html
    file: inventory.html
    auth_required: true
    description: Inventory and warehouse overview
  - path: /factory-release.html
    file: factory-release.html
    auth_required: true
    description: Factory release
  - path: /stock-count.html
    file: stock-count.html
    auth_required: true
    description: Stock count
  - path: /staff.html
    file: staff.html
    auth_required: true
    description: Staff/HR
  - path: /stores-dashboard.html
    file: stores-dashboard.html
    auth_required: true
    description: Stores dashboard
  - path: /reset-password.html
    file: reset-password.html
    auth_required: false
    description: Password reset
features:
  - name: User Login
    description: Sign in with email and password via Supabase Auth
    files:
      - login.html
      - login.js
      - auth.js
      - supabase-client.js
    entry_route: /login.html
    user_interactions:
      - Fill email input field
      - Fill password input field
      - Click Sign In button to submit
      - See error message on invalid credentials
      - Redirect to index.html on success
    api_calls:
      - method: POST
        endpoint: Supabase Auth signInWithPassword
    auth_required: false
  - name: Master Dashboard
    description: Role-based dashboard with links to Store, Warehouse, Inventory, etc.
    files:
      - index.html
      - app.js
      - auth.js
      - session.js
    entry_route: /
    user_interactions:
      - View dashboard cards (Store Operations, Warehouse, Inventory, etc.)
      - Click Store Operations to go to store.html
      - Click Warehouse to go to warehouse.html
      - Click Inventory to go to inventory.html
      - Logout
    api_calls: []
    auth_required: true
  - name: Store Dashboard
    description: Store operations dashboard with inventory in/out, branch stocks, sales
    files:
      - store.html
      - store.js
      - session.js
    entry_route: /store.html
    user_interactions:
      - View store stats and quick actions
      - Navigate to Inventory In, Inventory Out, Branch Stocks, Sales Today
      - Open daily sales report modal
    api_calls: []
    auth_required: true
  - name: Warehouse Dashboard
    description: Warehouse dashboard with inventory in and warehouse stocks
    files:
      - warehouse.html
      - warehouse.js
    entry_route: /warehouse.html
    user_interactions:
      - View warehouse action cards
      - Navigate to Inventory In, Warehouse Stocks
    api_calls: []
    auth_required: true
  - name: Store Inventory In
    description: Receive inventory into store (barcode scan, manual add)
    files:
      - store-inventory-in.html
      - store.js
    entry_route: /store-inventory-in.html
    user_interactions:
      - Select branch, scan or enter product, enter quantity, submit
    api_calls: []
    auth_required: true
  - name: Warehouse Inventory In
    description: Receive inventory into warehouse
    files:
      - warehouse-inventory-in.html
      - warehouse-inventory-in.js
    entry_route: /warehouse-inventory-in.html
    user_interactions:
      - Add products and quantities, submit receive
    api_calls: []
    auth_required: true
  - name: Inventory Overview
    description: Inventory view with factory release and warehouse dispatch links
    files:
      - inventory.html
      - inventory.js
    entry_route: /inventory.html
    user_interactions:
      - View inventory by location, navigate to factory release or warehouse dispatch
    api_calls: []
    auth_required: true
known_limitations:
  - issue: App requires Supabase backend and auth; tests may need valid credentials or mocked auth
    location: auth.js, login.js, supabase-client.js
    impact: E2E tests that hit login need real or test Supabase project
