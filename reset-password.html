<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Set New Password – MN+LA ERP</title>
    <meta name="description" content="Set a new password for your MN+LA Master Access account." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body class="login-page">

    <div class="login-wrapper">

        <!-- Logo -->
        <div class="login-logo">
            <svg viewBox="0 0 440 150" xmlns="http://www.w3.org/2000/svg" aria-label="MN+LA" role="img">
                <rect x="4" y="4" width="432" height="142" rx="6" ry="6" fill="none" stroke="white" stroke-width="8" />
                <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="white"
                    font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="82" font-weight="700"
                    letter-spacing="-2">MN+LA</text>
            </svg>
            <p class="login-tagline">Master Access</p>
        </div>

        <!-- Card -->
        <div class="login-card" role="main">
            <h1 class="login-card__title" id="cardTitle">Set New Password</h1>
            <p class="login-card__subtitle" id="cardSubtitle">Choose a strong password for your account.</p>

            <!-- Alert box -->
            <div class="login-error" id="alertBox" role="alert" style="display:none;">
                <span class="material-icons-round" id="alertIcon">error_outline</span>
                <span id="alertText"></span>
            </div>

            <!-- Form -->
            <form id="resetForm" class="login-form" novalidate>

                <div class="form-field">
                    <label class="form-label" for="newPassword">New password</label>
                    <div class="input-wrapper">
                        <input class="input" id="newPassword" type="password" placeholder="••••••••"
                            autocomplete="new-password" required />
                        <button type="button" class="input-toggle-pw" id="toggleNew" aria-label="Toggle password">
                            <span class="material-icons-round" id="toggleNewIcon">visibility</span>
                        </button>
                    </div>
                </div>

                <div class="form-field">
                    <label class="form-label" for="confirmPassword">Confirm password</label>
                    <div class="input-wrapper">
                        <input class="input" id="confirmPassword" type="password" placeholder="••••••••"
                            autocomplete="new-password" required />
                        <button type="button" class="input-toggle-pw" id="toggleConfirm" aria-label="Toggle password">
                            <span class="material-icons-round" id="toggleConfirmIcon">visibility</span>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn--primary btn--full" id="resetSubmit">
                    Save Password
                </button>

                <div class="login-links">
                    <a href="login.html" class="link">Back to Sign In</a>
                </div>

            </form>
        </div>

        <p class="login-footer">MN+LA ERP &copy; 2025 &nbsp;·&nbsp; All rights reserved</p>
    </div>

    <div id="toastContainer"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="auth.js"></script>
    <script src="reset-password.js"></script>

    <!-- Toggle visibility helpers -->
    <script>
        function togglePw(inputId, iconId) {
            const inp = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            const show = inp.type === 'password';
            inp.type = show ? 'text' : 'password';
            icon.textContent = show ? 'visibility_off' : 'visibility';
        }
        document.getElementById('toggleNew').addEventListener('click', () => togglePw('newPassword', 'toggleNewIcon'));
        document.getElementById('toggleConfirm').addEventListener('click', () => togglePw('confirmPassword', 'toggleConfirmIcon'));
    </script>

</body>

</html>
