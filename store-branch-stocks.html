<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Branch Stocks — Store Dashboard | MN+LA ERP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .store-layout { display: flex; min-height: calc(100vh - var(--nav-height)); padding-top: var(--nav-height); }
    .store-sidebar { width: 200px; flex-shrink: 0; background: var(--bg-secondary); border-right: 1px solid rgba(255,255,255,.06); padding: 16px 0; }
    .store-sidebar__header { display: flex; align-items: center; gap: 8px; padding: 0 16px 12px; font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); }
    .store-sidebar__nav { display: flex; flex-direction: column; gap: 2px; }
    .store-sidebar__link { display: flex; align-items: center; gap: 10px; padding: 10px 16px; font-size: .85rem; color: var(--text-secondary); text-decoration: none; transition: background .15s, color .15s; }
    .store-sidebar__link:hover { background: rgba(255,255,255,.05); color: var(--text-primary); }
    .store-sidebar__link.active { background: rgba(122,159,196,.12); color: #7a9fc4; font-weight: 600; }
    .store-main { flex: 1; overflow: auto; padding: 20px 24px 80px; max-width: 1100px; margin: 0 auto; }
    .sd-page-title { font-size: 1.35rem; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
    .sd-page-sub { font-size: .8rem; color: var(--text-muted); margin-bottom: 16px; }
    .sd-toolbar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .sd-search { flex: 1; min-width: 200px; padding: 10px 12px; border-radius: 9px; background: var(--bg-primary); border: 1px solid rgba(255,255,255,.09); color: var(--text-primary); font-size: .9rem; }
    .sd-filter-btn { padding: 8px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,.09); background: var(--bg-card); color: var(--text-secondary); font-size: .8rem; font-weight: 600; cursor: pointer; }
    .sd-filter-btn:hover { background: var(--bg-elevated); color: var(--text-primary); }
    .sd-filter-btn.active { border-color: rgba(122,159,196,.4); background: rgba(122,159,196,.1); color: #7a9fc4; }
    .sd-table-wrap { background: var(--bg-card); border: 1px solid rgba(255,255,255,.06); border-radius: 14px; overflow: hidden; }
    .sd-table { width: 100%; border-collapse: collapse; }
    .sd-table th { text-align: left; padding: 12px 16px; font-size: .7rem; text-transform: uppercase; letter-spacing: .05em; color: var(--text-muted); background: rgba(255,255,255,.03); border-bottom: 1px solid rgba(255,255,255,.06); }
    .sd-table td { padding: 12px 16px; font-size: .85rem; border-bottom: 1px solid rgba(255,255,255,.04); }
    .sd-table tr:last-child td { border-bottom: none; }
    .sd-table tr:hover { background: rgba(255,255,255,.02); }
    .sd-qty-low { color: #a8935c; font-weight: 600; }
    .sd-qty-zero { color: var(--text-muted); }
    .sd-empty { text-align: center; padding: 48px 20px; color: var(--text-muted); font-size: .9rem; }
  </style>
</head>
<body>
  <nav class="top-nav">
    <div class="nav-left">
      <div class="brand">
        <a href="store.html" style="display:block;"><svg class="nav-logo" viewBox="0 0 440 150" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MN+LA"><rect x="4" y="4" width="432" height="142" rx="6" fill="none" stroke="white" stroke-width="8" /><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="white" font-family="Inter,sans-serif" font-size="82" font-weight="700">MN+LA</text></svg></a>
      </div>
    </div>
    <div class="nav-right">
      <button class="logout-btn" id="logoutBtn" aria-label="Sign out"><span class="material-icons-round">logout</span></button>
      <div class="profile-wrapper" id="profileWrapper">
        <button class="profile-btn" id="profileBtn"><span class="profile-avatar" id="profileAvatar">—</span><span class="material-icons-round profile-chevron">expand_more</span></button>
        <div class="profile-dropdown">
          <div class="dropdown-header"><strong id="dropdownName">—</strong><small id="dropdownRole">—</small></div>
          <div class="dropdown-divider"></div>
          <a href="store.html" class="dropdown-item"><span class="material-icons-round">dashboard</span> Dashboard</a>
          <a href="#" class="dropdown-item dropdown-item--danger" id="storeLogout"><span class="material-icons-round">logout</span> Sign Out</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="store-layout">
    <aside class="store-sidebar">
      <div class="store-sidebar__header"><span class="material-icons-round">storefront</span> Store</div>
      <nav class="store-sidebar__nav">
        <a href="store.html" class="store-sidebar__link"><span class="material-icons-round">dashboard</span> Dashboard</a>
        <a href="store-inventory-in.html" class="store-sidebar__link"><span class="material-icons-round">input</span> Inventory In</a>
        <a href="store-inventory-out.html" class="store-sidebar__link"><span class="material-icons-round">output</span> Inventory Out</a>
        <a href="store-branch-stocks.html" class="store-sidebar__link active"><span class="material-icons-round">inventory_2</span> Branch Stocks</a>
        <a href="store-sales-today.html" class="store-sidebar__link"><span class="material-icons-round">point_of_sale</span> Sales Today</a>
      </nav>
    </aside>
    <main class="store-main">
      <h1 class="sd-page-title">Branch Stocks</h1>
      <p class="sd-page-sub">Inventory at your assigned branch. Read-only.</p>

      <div class="sd-toolbar">
        <input type="text" class="sd-search" id="searchInput" placeholder="Search by barcode or product name" />
        <button type="button" class="sd-filter-btn active" data-filter="all">All</button>
        <button type="button" class="sd-filter-btn" data-filter="low">Low stock (≤5)</button>
        <button type="button" class="sd-filter-btn" data-filter="out">Out of stock</button>
        <button type="button" class="sd-filter-btn" id="refreshStocksBtn" style="margin-left:auto;">Refresh</button>
      </div>

      <div class="sd-table-wrap">
        <table class="sd-table">
          <thead>
            <tr>
              <th>Barcode</th>
              <th>Product</th>
              <th>Size</th>
              <th>Color</th>
              <th>Quantity</th>
            </tr>
          </thead>
          <tbody id="stocksBody">
            <tr><td colspan="5" class="sd-empty">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-client.js"></script>
  <script src="auth.js"></script>
  <script src="session.js"></script>
  <script>
(function () {
  var LOW = 5;
  var allRows = [];
  var filter = 'all';
  var searchQ = '';

  async function guard() {
    await window.Auth.guard();
    var profile = window.Auth.profile;
    var allowed = profile && (profile.role === 'store_associate' || profile.role === 'owner' || profile.role === 'admin');
    if (!allowed) {
      window.location.replace('index.html');
      return;
    }
    if (profile.role === 'store_associate' && !profile.location_id) {
      if (window.Auth.toast) window.Auth.toast('No assigned branch.', 'error');
      return;
    }
    document.getElementById('dropdownName').textContent = profile.full_name || 'User';
    document.getElementById('dropdownRole').textContent = (profile.role || '') + (profile.locations && profile.locations.name ? ' • ' + profile.locations.name : '');
    document.getElementById('profileAvatar').textContent = (profile.full_name || 'U').split(' ').map(function(w){ return w[0]; }).join('').toUpperCase().slice(0, 2);
    function _doLogout(e){ e.preventDefault(); e.stopPropagation(); (window.Auth && window.Auth.logout) ? window.Auth.logout() : window.location.replace('login.html'); }
    document.getElementById('logoutBtn').addEventListener('click', _doLogout);
    var _sl = document.getElementById('storeLogout'); if (_sl) _sl.addEventListener('click', _doLogout);
    var pw = document.getElementById('profileWrapper');
    document.getElementById('profileBtn').addEventListener('click', function(e){ e.stopPropagation(); pw.classList.toggle('open'); });
    document.addEventListener('click', function(){ pw.classList.remove('open'); });
    return true;
  }

  function filterRows() {
    var q = searchQ.toLowerCase();
    var list = allRows.filter(function(r) {
      var matchSearch = !q || (r.barcode && r.barcode.toLowerCase().indexOf(q) >= 0) || (r.name && r.name.toLowerCase().indexOf(q) >= 0);
      var matchFilter = filter === 'all' || (filter === 'low' && r.quantity > 0 && r.quantity <= LOW) || (filter === 'out' && r.quantity === 0);
      return matchSearch && matchFilter;
    });
    var tbody = document.getElementById('stocksBody');
    if (list.length === 0) {
      var emptyMsg = allRows.length === 0
        ? 'No products in this branch yet. Add products from Inventory In, then click Refresh.'
        : 'No items match.';
      tbody.innerHTML = '<tr><td colspan="5" class="sd-empty">' + emptyMsg + '</td></tr>';
      return;
    }
    tbody.innerHTML = list.map(function(r) {
      var qtyClass = r.quantity === 0 ? 'sd-qty-zero' : (r.quantity <= LOW ? 'sd-qty-low' : '');
      return '<tr><td>' + (r.barcode || '—') + '</td><td>' + (r.name || '—') + '</td><td>' + (r.size || '—') + '</td><td>' + (r.color || '—') + '</td><td class="' + qtyClass + '">' + r.quantity + '</td></tr>';
    }).join('');
  }

  async function loadStocks() {
    if (!window.db) return;
    var tbody = document.getElementById('stocksBody');
    tbody.innerHTML = '<tr><td colspan="5" class="sd-empty">Loading…</td></tr>';
    var locationId = null;
    try {
      var pr = await window.db.rpc('get_my_profile');
      var prof = (pr && pr.data) ? (Array.isArray(pr.data) ? pr.data[0] : pr.data) : null;
      locationId = prof && prof.location_id ? prof.location_id : null;
    } catch (_) {}
    if (locationId) {
      var direct = await window.db.from('inventory').select('quantity, product_id, products(barcode, name, size, color, sku)').eq('location_id', locationId);
      if (!direct.error && direct.data && Array.isArray(direct.data)) {
        allRows = direct.data.map(function(row) {
          var p = row.products != null ? row.products : row.product;
          if (Array.isArray(p)) p = p[0];
          if (!p || typeof p !== 'object') p = {};
          return {
            barcode: p.barcode != null ? p.barcode : '',
            name: p.name != null ? p.name : '',
            size: p.size != null ? p.size : '',
            color: p.color != null ? p.color : '',
            quantity: typeof row.quantity === 'number' ? row.quantity : (parseInt(row.quantity, 10) || 0)
          };
        });
        filterRows();
        return;
      }
      var invOnly = await window.db.from('inventory').select('product_id, quantity').eq('location_id', locationId);
      if (!invOnly.error && invOnly.data && Array.isArray(invOnly.data) && invOnly.data.length > 0) {
        var ids = invOnly.data.map(function(r) { return r.product_id; }).filter(Boolean);
        var uniq = ids.filter(function(id, i) { return ids.indexOf(id) === i; });
        var prods = await window.db.from('products').select('id, barcode, name, size, color').in('id', uniq);
        var prodMap = {};
        if (!prods.error && prods.data) (prods.data || []).forEach(function(p) { prodMap[p.id] = p; });
        allRows = invOnly.data.map(function(row) {
          var p = prodMap[row.product_id] || {};
          return {
            barcode: p.barcode != null ? p.barcode : '',
            name: p.name != null ? p.name : '',
            size: p.size != null ? p.size : '',
            color: p.color != null ? p.color : '',
            quantity: typeof row.quantity === 'number' ? row.quantity : (parseInt(row.quantity, 10) || 0)
          };
        });
        filterRows();
        return;
      }
    }
    var res = await window.db.rpc('get_store_branch_stocks', locationId ? { p_location_id: locationId } : {});
    var data = res.data, error = res.error;
    if (error) {
      tbody.innerHTML = '<tr><td colspan="5" class="sd-empty">Error loading stocks. Click Refresh to retry.</td></tr>';
      return;
    }
    if (data && typeof data === 'string') {
      try { data = JSON.parse(data); } catch (_) {}
    }
    if (data && typeof data === 'object' && data !== null && !Array.isArray(data)) {
      if (Array.isArray(data.data)) data = data.data;
      else if (typeof Object.values === 'function' && Object.values(data).length > 0 && typeof Object.values(data)[0] === 'object' && Object.values(data)[0] !== null)
        data = Object.values(data);
      else data = [data];
    }
    var raw = Array.isArray(data) ? data : (data ? [data] : []);
    function norm(row) {
      if (!row || typeof row !== 'object') return { barcode: '', name: '', size: '', color: '', quantity: 0 };
      return { barcode: row.barcode != null ? row.barcode : '', name: row.name != null ? row.name : '', size: row.size != null ? row.size : '', color: row.color != null ? row.color : '', quantity: typeof row.quantity === 'number' ? row.quantity : (parseInt(row.quantity, 10) || 0) };
    }
    allRows = raw.map(norm);
    filterRows();
  }

  document.querySelectorAll('.sd-filter-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.sd-filter-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      filter = btn.dataset.filter;
      filterRows();
    });
  });
  document.getElementById('searchInput').addEventListener('input', function() {
    searchQ = this.value.trim();
    filterRows();
  });
  var refreshBtn = document.getElementById('refreshStocksBtn');
  if (refreshBtn) refreshBtn.addEventListener('click', function() { loadStocks(); if (window.Auth.toast) window.Auth.toast('Refreshed.', 'success'); });

  guard().then(function(ok) {
    if (ok) loadStocks();
  });
  document.addEventListener('visibilitychange', function() {
    if (document.visibilityState === 'visible') loadStocks();
  });
})();
  </script>
</body>
</html>
