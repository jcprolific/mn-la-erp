<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Staff Management — MN+LA ERP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <style>
        .page {
            padding: calc(var(--nav-height) + 20px) 24px 80px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            gap: 16px;
            flex-wrap: wrap;
        }

        .title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -.035em;
        }

        .actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: .85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .2s;
            border: 1px solid rgba(255, 255, 255, .1);
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .btn:hover {
            background: var(--bg-elevated);
            border-color: rgba(255, 255, 255, .2);
        }

        .btn--primary {
            background: rgba(122, 159, 196, .15);
            border-color: rgba(122, 159, 196, .4);
            color: #aac8e8;
        }

        .btn--primary:hover {
            background: rgba(122, 159, 196, .25);
            border-color: rgba(122, 159, 196, .6);
            box-shadow: 0 4px 12px rgba(122, 159, 196, .2);
        }

        .btn--danger {
            background: rgba(255, 77, 106, 0.1);
            border-color: rgba(255, 77, 106, 0.3);
            color: #ff4d6a;
        }

        .table-wrap {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, .05);
            border-radius: 12px;
            overflow: hidden;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table th {
            text-align: left;
            padding: 12px 16px;
            font-size: .75rem;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, .02);
            border-bottom: 1px solid rgba(255, 255, 255, .05);
        }

        .table td {
            padding: 12px 16px;
            vertical-align: middle;
            border-bottom: 1px solid rgba(255, 255, 255, .03);
            font-size: .85rem;
        }

        .empty-state {
            padding: 40px;
            text-align: center;
            color: var(--text-muted);
        }

        .role-badge {
            background: rgba(255, 255, 255, .05);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: .7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .05em;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: .7rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-active {
            background: rgba(52, 211, 153, 0.1);
            color: #34d399;
        }

        .status-banned {
            background: rgba(245, 166, 35, 0.1);
            color: #f5a623;
        }

        /* Modals */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, .75);
            backdrop-filter: blur(10px);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 22px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 32px 80px rgba(0, 0, 0, .65);
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 22px;
            padding-bottom: 18px;
            border-bottom: 1px solid rgba(255, 255, 255, .06);
        }

        .modal-title {
            font-size: 1.15rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: .75rem;
            font-weight: 600;
            letter-spacing: .05em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border-radius: 9px;
            background: var(--bg-primary);
            border: 1px solid rgba(255, 255, 255, .09);
            color: var(--text-primary);
            font-family: inherit;
            font-size: .85rem;
            outline: none;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: rgba(122, 159, 196, .4);
        }
    </style>
</head>

<body>
    <!-- Top Navigation -->
    <nav class="top-nav">
        <div class="nav-left">
            <a href="index.html" style="text-decoration:none; display:block;">
                <div class="brand">
                    <svg class="nav-logo" viewBox="0 0 440 150" xmlns="http://www.w3.org/2000/svg" role="img"
                        aria-label="MN+LA">
                        <rect x="4" y="4" width="432" height="142" rx="6" ry="6" fill="none" stroke="white"
                            stroke-width="8" />
                        <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="white"
                            font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="82" font-weight="700"
                            letter-spacing="-2">MN+LA</text>
                    </svg>
                </div>
            </a>
            <div class="nav-links">
                <a href="inventory.html" class="nav-link">Inventory</a>
                <a href="warehouse-dispatch.html" class="nav-link">Transfers</a>
                <a href="staff.html" class="nav-link active">Staff</a>
            </div>
        </div>
        <div class="nav-right">
            <div class="profile-wrapper" id="profileWrapper">
                <button class="icon-btn profile-btn" id="profileBtn">
                    <span class="material-icons-round">account_circle</span>
                </button>
                <div class="profile-dropdown">
                    <div class="dropdown-header">
                        <div class="dropdown-name" id="dropName">Loading...</div>
                        <div class="dropdown-role" id="dropRole">Loading...</div>
                    </div>
                    <a href="login.html" class="dropdown-item" onclick="Auth.signOut(event)">
                        <span class="material-icons-round">logout</span> Sign Out
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="page">
        <a href="index.html" class="sd-back"
            style="display:inline-flex;align-items:center;gap:6px;color:var(--text-muted);font-size:.78rem;font-weight:500;text-decoration:none;padding:6px 12px 6px 8px;border-radius:8px;margin-bottom:16px;">
            <span class="material-icons-round" style="font-size:16px;">arrow_back</span>
            Back to Dashboard
        </a>

        <div class="header">
            <h1 class="title">Staff Management</h1>
            <div class="actions">
                <button class="btn btn--primary" id="btnAddStaff">
                    <span class="material-icons-round" style="font-size:18px;">person_add</span> Add Staff
                </button>
            </div>
        </div>

        <div class="table-wrap">
            <table class="table">
                <thead>
                    <tr>
                        <th>Name & Email</th>
                        <th>Role</th>
                        <th>Assigned Branch</th>
                        <th>Status</th>
                        <th style="text-align:right;">Actions</th>
                    </tr>
                </thead>
                <tbody id="staffTableBody">
                    <tr>
                        <td colspan="5" class="empty-state">Loading staff...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Staff Modal -->
    <div class="modal-overlay" id="staffModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">
                    <span class="material-icons-round">person</span> Add New Staff
                </div>
                <button class="btn" style="padding:4px;border:none;" id="btnCancelStaff">✕</button>
            </div>

            <input type="hidden" id="staffId" value="" />

            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" id="staffName" placeholder="e.g. Juan De La Cruz" />
            </div>

            <div class="form-group">
                <label>Email Address *</label>
                <input type="email" id="staffEmail" placeholder="e.g. juan@mnla.com" />
            </div>

            <div class="form-group" id="passwordGroup">
                <label>Temporary Password *</label>
                <input type="password" id="staffPassword" placeholder="Minimum 6 characters" />
            </div>

            <div class="form-group">
                <label>System Role *</label>
                <select id="staffRole">
                    <option value="owner">Owner</option>
                    <option value="admin">Admin</option>
                    <option value="warehouse_staff">Warehouse Staff</option>
                    <option value="store_associate" selected>Store Associate</option>
                    <option value="accountant">Accountant</option>
                    <option value="viewer">Viewer</option>
                </select>
            </div>

            <div class="form-group" id="staffLocationGroup">
                <label>Assigned Location *</label>
                <select id="staffLocation">
                    <option value="">-- Select Store (Required) --</option>
                </select>
            </div>

            <div
                style="display:flex; justify-content:flex-end; gap:10px; margin-top:24px; border-top:1px solid rgba(255,255,255,.06); padding-top:16px;">
                <button class="btn btn--danger" id="btnToggleStatus"
                    style="display:none; margin-right:auto;">Disable</button>
                <button class="btn btn--primary" id="btnSaveStaff">Save Profile</button>
            </div>
        </div>
    </div>

    <div class="sd-toast" id="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="auth.js"></script>
    <script src="staff.js"></script>

    <script>
        const _pw = document.getElementById('profileWrapper');
        const _pb = document.getElementById('profileBtn');
        if (_pb) _pb.addEventListener('click', e => { e.stopPropagation(); _pw.classList.toggle('open'); });
        document.addEventListener('click', () => { if (_pw) _pw.classList.remove('open'); });
    </script>
</body>

</html>
